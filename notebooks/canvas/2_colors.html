  <script id="intro" type="text/markdown">
    # Farben 🌈

    Bis jetzt haben wir nur schwarze Rechtecke gezeichnet. Zeit für etwas Farbe!

    ## Wie Computer Farben darstellen

    Das gängigste System ist **RGB** — **R**ot **G**rün **B**lau. Eine Farbe
    besteht aus drei Zahlen, jeweils zwischen **0 und 255**:

    - **R** (Rot): wie viel Rot? (0 = kein Rot, 255 = maximales Rot)
    - **G** (Grün): wie viel Grün?
    - **B** (Blau): wie viel Blau?

    > 📌 RGB ist **additive Farbmischung** — wir mischen Licht, nicht Farbe! Alle
    > Werte auf `0` → **Schwarz** (kein Licht). Alle Werte auf `255` → **Weiß**.

    | Farbe   | RGB-Notation         |
    | ------- | -------------------- |
    | Rot     | `rgb(255, 0, 0)`     |
    | Grün    | `rgb(0, 255, 0)`     |
    | Blau    | `rgb(0, 0, 255)`     |
    | Gelb    | `rgb(255, 255, 0)`   |
    | Cyan    | `rgb(0, 255, 255)`   |
    | Magenta | `rgb(255, 0, 255)`   |
    | Weiß    | `rgb(255, 255, 255)` |
    | Schwarz | `rgb(0, 0, 0)`       |
    | Grau    | `rgb(128, 128, 128)` |
  </script>

  <script id="setcolors-md" type="text/markdown">
    ## Farben in Canvas setzen

    In Canvas funktionieren Farben wie bei einem echten Pinsel:

    1. Du **wählst eine Farbe** (tauchst den Pinsel ein)
    2. Du **malst** mit dieser Farbe
    3. Die Farbe bleibt aktiv, **bis du sie wechselst**

    - **`ctx.fillStyle`** — Farbe für **ausgefüllte** Formen
    - **`ctx.strokeStyle`** — Farbe für **Umrisse**
  </script>

  <script id="setcolors-demo" type="module">
    const code_set = view(codeEditor("canvas:colors-set", {
      value: `ctx.fillStyle = "rgb(255, 0, 0)"    // Rot wählen
ctx.fillRect(50, 50, 100, 100)        // Rotes Rechteck

ctx.strokeStyle = "rgb(0, 128, 0)"  // Grün wählen
ctx.lineWidth = 4
ctx.strokeRect(200, 50, 100, 100)     // Grüner Umriss`
    }));
  </script>
  <script id="setcolors-out" type="module">
    display(canvasOutput(code_set, { width: 400, height: 220 }));
  </script>

  <script id="brush-md" type="text/markdown">
    ### Das Pinsel-Prinzip

    Einmal gewählt, bleibt die Farbe für **alle folgenden** Formen aktiv — bis du
    sie wechselst. Beide ersten Rechtecke unten sind rot, obwohl `fillStyle` nur
    einmal gesetzt wurde:
  </script>

  <script id="brush-demo" type="module">
    const code_brush = view(codeEditor("canvas:colors-brush", {
      value: `ctx.fillStyle = "rgb(255, 0, 0)";   // Pinsel in Rot tauchen
ctx.fillRect(50, 50, 100, 100);      // Rotes Rechteck
ctx.fillRect(200, 50, 100, 100);     // Noch ein rotes Rechteck!

ctx.fillStyle = "rgb(0, 0, 255)";   // Pinsel in Blau tauchen
ctx.fillRect(125, 125, 100, 100);     // Blaues Rechteck`
    }));
  </script>
  <script id="brush-out" type="module">
    display(canvasOutput(code_brush, { width: 350, height: 350 }));
  </script>

  <script id="notation-md" type="text/markdown">
    ## Verschiedene Farbnotationen

    Canvas akzeptiert mehrere Schreibweisen für dieselbe Farbe:

    ```javascript
    ctx.fillStyle = "rgb(255, 100, 50)"  // 1. RGB
    ctx.fillStyle = "#FF6432"            // 2. Hex (gleiche Farbe)
    ctx.fillStyle = "#F00"               // Kurzform für #FF0000
    ctx.fillStyle = "red"                // 3. Farbname
    ```

    > 💡 RGB gibt dir die meiste Kontrolle, Farbnamen sind am einfachsten für
    > Standardfarben. Eine vollständige Liste aller Namen findest du im
    > [MDN](https://developer.mozilla.org/en-US/docs/Web/CSS/named-color).
  </script>

  <script id="notation-demo" type="module">
    const code_notation = view(codeEditor("canvas:colors-notation", {
      value: `ctx.fillStyle = "rgb(255, 100, 50)"
ctx.fillRect(20, 50, 100, 100)

ctx.fillStyle = "#FF6432"
ctx.fillRect(150, 50, 100, 100)

ctx.fillStyle = "tomato"
ctx.fillRect(280, 50, 100, 100)`
    }));
  </script>
  <script id="notation-out" type="module">
    display(canvasOutput(code_notation, { width: 420, height: 220 }));
  </script>

  <script id="rgba-md" type="text/markdown">
    ## RGBA — Transparenz

    Mit **RGBA** kannst du Farben halbtransparent machen. Der vierte Wert
    (**Alpha**) liegt zwischen `0` (komplett transparent) und `1` (komplett
    undurchsichtig):

    ```javascript
    ctx.fillStyle = "rgba(255, 0, 0, 0.5)"  // 50 % transparentes Rot
    ```
  </script>

  <script id="rgba-demo" type="module">
    const code_rgba = view(codeEditor("canvas:colors-rgba", {
      value: `ctx.fillStyle = "rgb(255, 0, 0)"
ctx.fillRect(50, 50, 150, 150)

ctx.fillStyle = "rgba(0, 0, 255, 0.5)"  // 50 % transparentes Blau
ctx.fillRect(100, 100, 150, 150)          // überlappt das rote`
    }));
  </script>
  <script id="rgba-out" type="module">
    display(canvasOutput(code_rgba, { width: 320, height: 300 }));
  </script>

  <script id="ex1-demo" type="module">
    const code_ex1 = view(codeEditor("canvas:colors-ex1", {

`

  <script id="ex1-out" type="module">
    display(canvasOutput(code_ex1, { width: 360, height: 320 }));
  </script>
  <script id="ex1-test" type="module">
    display(canvasTestReport(canvasTest(code_ex1, {
      width: 360, height: 320,
      checks: [
        { name: "Drei Rechtecke gezeichnet", run: ({ base }) => {
            const n = base.callsTo("fillRect").length;
            return { passed: n >= 3, detail: `${n} gezeichnet` };
        } },
        { name: "Mit Transparenz (rgba, Alpha < 1)", run: ({ base }) => {
            const hit = base.setsOf("fillStyle").map(String).some(s => {
              const m = s.match(/rgba\(\s*\d+\s*,\s*\d+\s*,\s*\d+\s*,\s*([\d.]+)\s*\)/i);
              return m && parseFloat(m[1]) < 1;
            });
            return { passed: hit, detail: hit ? null : "nutze rgba(R, G, B, 0.7)" };
        } },
        { name: "Quadrate überlappen sich", run: ({ base }) => {
            const r = base.callsTo("fillRect").map(c => c.args);
            const ov = (a, b) => a[0] < b[0] + b[2] && b[0] < a[0] + a[2] &&
                                 a[1] < b[1] + b[3] && b[1] < a[1] + a[3];
            for (let i = 0; i < r.length; i++)
              for (let j = i + 1; j < r.length; j++)
                if (ov(r[i], r[j])) return true;
            return false;
        } }
      ]
    }), "Übung 1"));
  </script>

  <script id="ex2-md" type="text/markdown">
    ## Übung 2 🎯 — Schachbrett

    Denk an die Loops aus dem JS-Tutorial zurück und male **möglichst effizient**
    ein Schachbrett: **8 × 8** Quadrate, alternierende Farben, dunkles Feld in
    der linken unteren Ecke.

    > ⚠️ 64-mal `ctx.fillRect` zu kopieren zählt **nicht** als Lösung — benutze
    > verschachtelte `for`-Loops!

    <details><summary>💡 Tipp anzeigen</summary>

    - Zwei verschachtelte Loops über `zeile` (0–7) und `spalte` (0–7).
    - Ein Feld ist dunkel, wenn `(zeile + spalte) % 2 === 0` … oder `=== 1`,
      je nachdem wo das dunkle Feld liegen soll.
    - Position eines Feldes: `x = spalte * größe`, `y = zeile * größe`.

    </details>
  </script>

  <script id="ex2-demo" type="module">
    const code_ex2 = view(codeEditor("canvas:colors-ex2", {
      value: ``
    }));
  </script>
  <script id="ex2-out" type="module">
    display(canvasOutput(code_ex2, { width: 320, height: 320 }));
  </script>
  <script id="ex2-test" type="module">
    display(canvasTestReport(canvasTest(code_ex2, {
      width: 320, height: 320,
      checks: [
        { name: "Dunkles Feld unten links", run: ({ base }) => {
            const p = base.pixel(20, 300);
            const lum = (p[0] + p[1] + p[2]) / 3;
            return { passed: lum < 150, detail: `Helligkeit ${Math.round(lum)}` };
        } },
        { name: "Lückenloses 8 × 8 Schachbrett", run: ({ base }) => {
            const size = 40;   // 320 / 8 — die Felder müssen das Brett ohne Lücken füllen
            const lum = (x, y) => { const p = base.pixel(x, y); return (p[0] + p[1] + p[2]) / 3; };
            // Unten links muss dunkel sein → das legt fest, welche Parität dunkel ist.
            if (lum(20, 7 * size + 20) >= 128) return { passed: false, detail: "unten links ist nicht dunkel" };
            const darkParity = (0 + 7) % 2;
            let bad = 0, checked = 0;
            for (let col = 0; col < 8; col++) for (let row = 0; row < 8; row++) {
              const expectDark = ((col + row) % 2) === darkParity;
              // Mitte UND Nähe der Feldkante prüfen — so fallen zu kleine Felder
              // (z. B. fillRect(x, y, 40, 30)) durch ihre Lücken auf.
              for (const [ox, oy] of [[20, 20], [32, 34]]) {
                const isDark = lum(col * size + ox, row * size + oy) < 128;
                checked++;
                if (isDark !== expectDark) bad++;
              }
            }
            return { passed: bad === 0, detail: bad ? `${bad}/${checked} Stellen falsch — Lücken oder falsche Feldgröße?` : null };
        } }
      ]
    }), "Übung 2"));
  </script>

  <script id="ex3-test" type="module">
    // Findet den Schwerpunkt aller Pixel, die ein Farbkriterium erfüllen.
    const find3 = (base, pred) => {
      let n = 0, sx = 0, sy = 0;
      for (let y = 0; y < base.height; y += 4) for (let x = 0; x < base.width; x += 4) {
        const [r, g, b] = base.pixel(x, y);
        if (pred(r, g, b)) { n++; sx += x; sy += y; }
      }
      return { count: n, cx: n ? sx / n : 0, cy: n ? sy / n : 0 };
    };
    // qx/qy: -1 = linke/obere Hälfte, +1 = rechte/untere Hälfte.
    const quadrant = (base, pred, qx, qy, label) => {
      const r = find3(base, pred);
      if (r.count <= 20) return { passed: false, detail: `kein ${label} gefunden` };
      const okX = qx < 0 ? r.cx < base.width / 2 : r.cx > base.width / 2;
      const okY = qy < 0 ? r.cy < base.height / 2 : r.cy > base.height / 2;
      return { passed: okX && okY, detail: okX && okY ? null : `${label} an der falschen Position` };
    };
    const isRed = (r, g, b) => r > 150 && g < 90 && b < 90;
    const isGreen = (r, g, b) => g > 90 && r < 120 && b < 120;
    const isBlue = (r, g, b) => b > 150 && r < 90 && g < 90;
    const isYellow = (r, g, b) => r > 150 && g > 150 && b < 90;
    const isBlack = (r, g, b) => r < 60 && g < 60 && b < 60;
    display(canvasTestReport(canvasTest(code_ex3, {
      width: 300, height: 300, extract: "quadratMitRand",
      checks: [
        { name: "Funktion `quadratMitRand` existiert", run: ({ base }) =>
            ({ passed: base.fnFound, detail: base.fnFound ? null : "Funktion `quadratMitRand` nicht gefunden" }) },
        { name: "Rotes Quadrat oben links", run: ({ base }) => quadrant(base, isRed, -1, -1, "rotes Quadrat") },
        { name: "Grünes Quadrat oben rechts", run: ({ base }) => quadrant(base, isGreen, 1, -1, "grünes Quadrat") },
        { name: "Blaues Quadrat unten links", run: ({ base }) => quadrant(base, isBlue, -1, 1, "blaues Quadrat") },
        { name: "Gelbes Quadrat unten rechts", run: ({ base }) => quadrant(base, isYellow, 1, 1, "gelbes Quadrat") },
        { name: "Schwarze Ränder (rot & blau)", run: ({ base }) => {
            const blk = find3(base, isBlack);
            return { passed: blk.count > 20, detail: blk.count > 20 ? null : "die schwarzen Ränder fehlen" };
        } }
      ]
    }), "Übung 3"));
