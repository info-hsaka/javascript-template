  <script id="setup" type="module">
    import { createUI, installThemeToggle, installHashImportBanner } from "./lib/helpers.js";
    import { createGameUI, loadGame, makeClient, prepareGameFile } from "./lib/bgio.js";
    installThemeToggle({ html, display });
    installHashImportBanner({ html, display });
    const { codeEditor, ok, err, hint } = createUI({ html });
    const { gameBoard, mountEditor, mountGameSection } = createGameUI({ html });

  <script id="panel" type="module">
    const editor = codeEditor("bgio:game", { value: starter, label: "Deine Datei: TicTacToe.js" });
    const boardSlot = html`<div></div>`;
    const feedbackSlot = html`<div></div>`;

    function check(code) {
      try {
        const client = makeClient(loadGame(code));
        const st = client.getState();
        const cells = st && st.G && st.G.cells;
        const setupOk = Array.isArray(cells) && cells.length === 9 && cells.every(c => c === null);
        if (!setupOk)
          return err(html`<code>setup</code> sollte <code>{ cells: [...] }</code> mit genau 9-mal <code>null</code> zurΟΦckgeben.`);
        client.moves.clickCell(4);
        if (client.getState().G.cells[4] !== "0")
          return err(html`Nach <code>clickCell(4)</code> von Spieler 0 sollte <code>cells[4]</code> den Wert <code>"0"</code> haben βÄî trag <code>move.playerID</code> an der Stelle <code>cellIndex</code> ein.`);
        return ok(html`πüéâ Geschafft! <code>setup</code> und <code>clickCell</code> funktionieren.`);
      } catch (e) {
        return err(html`Dein Code lΟΛsst sich nicht ausfΟΦhren: ${e.message}`);
      }
    }

    function rerun() {
      const code = editor.value;
      boardSlot.replaceChildren(gameBoard(code, {
        showDebug: true,
        showState: true,
        hint: "Alle Markierungen sind β€ï (Spieler 0), bis du im Debug Panel auf endTurn klickst βÄî automatisches Wechseln kommt in Kapitel 2."
      }));
      feedbackSlot.replaceChildren(check(code));
    }
    mountEditor({ editor });
    const section = mountGameSection({
      nodes: [boardSlot, feedbackSlot],
      onRun: () => { const b = editor.querySelector(".run-button"); if (b) b.click(); }
    });
    editor.addEventListener("input", () => { rerun(); section.expand(); });
    rerun();
  </script>

  <script id="setup-md" type="text/markdown">
    ## Der Spielzustand `G` βÄî die `setup`-Funktion

    Die `setup`-Funktion legt den **Anfangswert** des Spielzustands `G` fest.
    boardgame.io ruft sie zu Beginn eines Spiels fΟΦr dich auf.

    > πü™¨ **Info** βÄî Der Spielzustand `G` ist ein einfaches JavaScript-Objekt, das den
    > Zustand des Spiels reprΟΛsentiert (so wie wir es wΟΛhrend der PrΟΛsenzveranstaltung
    > besprochen haben). Wenn du irgendwann eine Frage zu boardgame.io oder einem
    > Konzept hast, frag gerne nach und schau dich in der restlichen Dokumentation um.

    FΟΦr Tic-Tac-Toe besteht `G` aus einem Array `cells` mit **9 Feldern**. Am Anfang
    ist jedes Feld leer βÄî das stellen wir mit `null` dar. `setup` soll also ein Objekt
    der Form `{ cells: [...] }` zurΟΦckgeben, in dem `cells` **neun** `null`-Werte
    enthΟΛlt.

    > πü™¨ **Info** βÄî Die Syntax `setup: function setup() { ... }` definiert eine
    > **Funktion in einem Objekt**. Sie ist dann als `TicTacToe.setup()` verfΟΦgbar.
    > Aufrufen musst du sie nicht selbst βÄî boardgame.io macht das fΟΦr uns.

    πüëâ **Deine Aufgabe:** FΟΦlle das `TODO Kapitel 1` in `setup` (rechts) aus.
  </script>

  <script id="moves-md" type="text/markdown">
    ## SpielzΟΦge βÄî der `clickCell`-Move

    Ein **Move** (Spielzug) ist eine Funktion, die eine Eingabe entgegennimmt (z. B.
    die Zelle, auf die geklickt wurde) und `G` auf den gewΟΦnschten neuen Zustand
    aktualisiert. Moves reprΟΛsentieren das, was ein Spieler im Spiel **tun** kann. Bei
    Tic-Tac-Toe: auf eine Zelle klicken und dort seine Markierung setzen. Das
    `moves`-Objekt ist eine Sammlung aller mΟΕglichen SpielzΟΦge mit ihren Namen.

    Move-Funktionen bekommen als **erstes Argument** ein Objekt (wir nennen es `move`)
    mit nΟΦtzlichen Feldern βÄî vor allem `move.G` (der Spielzustand) und `move.playerID`
    (die ID, kurz fΟΦr *Identifikator*, des ziehenden Spielers βÄî bei uns `"0"` oder
    `"1"`). Das **zweite Argument** ist alles Weitere, das wir brauchen βÄî bei
    `clickCell` der `cellIndex`, also **welches** Feld geklickt wurde.

    Um den Zustand zu ΟΛndern, schreiben wir die `playerID` an die passende Stelle im
    `cells`-Array:

    ```js
    move.G.cells[cellIndex] = move.playerID;
    ```

    > πü£Γ Du kannst zum Ausprobieren auch erstmal nur etwas ausgeben, z. B.
    > `console.log("Spieler " + move.playerID + " klickt Feld " + cellIndex)`. Die
    > Ausgabe erscheint unter dem Spielfeld. FΟΦr die Ο€bung brauchst du dann aber die
    > Zeile oben, die `G` verΟΛndert.

    > πü™¨ **Info** βÄî Die `setup`-Funktion bekommt ΟΦbrigens auch ein Objekt als erstes
    > Argument (mit `ctx`), genau wie ein Move. Das ist nΟΦtzlich, wenn man den
    > Anfangszustand z. B. an die **Anzahl der Spieler** anpassen will βÄî fΟΦr Tic-Tac-Toe
    > brauchen wir das aber nicht.

    πüëâ **Deine Aufgabe:** FΟΦlle das `TODO Kapitel 1` in `clickCell` aus.
  </script>
