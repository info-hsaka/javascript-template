  <script id="intro" type="text/markdown">
    # 4. Bots 🤖

    Zum Abschluss geben wir dem Spiel einen **Computer-Gegner**. Wir müssen dem Bot
    nur mitteilen, welche Spielzüge im Spiel überhaupt erlaubt sind — den Rest erledigt
    das Framework, indem es Züge sucht, die eher zu einem Sieg führen.

    Dafür fügen wir der Spieldefinition einen `ai`-Abschnitt mit einer
    `enumerate`-Funktion hinzu.
  </script>

  <script id="enumerate-md" type="text/markdown">
    ## `ai.enumerate` — welche Züge sind möglich?

    Die Funktion `enumerate` bekommt den Spielzustand `G` und soll ein **Array aller
    möglichen Spielzüge** zurückgeben. Jeder Spielzug ist ein Objekt mit dem Namen des
    Moves (`move`) und seinen Argumenten (`args`):

    ```js
    { move: 'clickCell', args: [0] }   // clickCell(0)
    ```

    Bei Tic-Tac-Toe ist jeder `clickCell`-Zug auf eine **leere** Zelle möglich. Die
    Startvariante unten gibt aber immer nur die Zelle oben links (`0`) zurück — der Bot
    kann damit also nur ein einziges Feld bespielen.

    > 📌 **So spielt unser Bot** — Im echten boardgame.io durchsucht der Bot mit einem
    > Verfahren namens [MCTS](https://nicolodavis.com/blog/tic-tac-toe/) den Spielbaum
    > und wählt **gute** Züge. Unser eingebauter Browser-Bot ist simpler: Er wählt
    > **zufällig** einen der Züge, die `enumerate` zurückgibt. Genau deshalb ist
    > `enumerate` so wichtig — gibt es nur einen Zug zurück, kann der Bot auch nur
    > diesen einen spielen.
  </script>

  <script id="enum-demo-editor" type="module">
    const demoCode = view(codeEditor("bgio:enum_demo", {
      value: `import { INVALID_MOVE } from 'boardgame.io/core';

function isVictory(cells) {
  const lines = [
    [0, 1, 2], [3, 4, 5], [6, 7, 8],
    [0, 3, 6], [1, 4, 7], [2, 5, 8],
    [0, 4, 8], [2, 4, 6],
  ];
  for (const line of lines) {
    const [a, b, c] = line;
    if (cells[a] !== null && cells[a] === cells[b] && cells[a] === cells[c]) {
      return cells[a];
    }
  }
  return null;
}

function isDraw(cells) {
  return cells.every(cell => cell !== null);
}

export const TicTacToe = {
  setup: function setup() {
    return { cells: [null, null, null, null, null, null, null, null, null] }
  },

  moves: {
    clickCell: function clickCell(move, cellIndex) {
      if (move.G.cells[cellIndex] !== null) {
        return INVALID_MOVE;
      }
      move.G.cells[cellIndex] = move.playerID;
    },
  },

  turn: { minMoves: 1, maxMoves: 1 },

  endIf: function endIf(endIf) {
    const winner = isVictory(endIf.G.cells);
    if (winner != null) {
      return { winner: winner };
    }
    if (isDraw(endIf.G.cells)) {
      return { draw: true };
    }
  },

  ai: {
    enumerate: function enumerate(G) {
      // Diese Funktion gibt immer nur die Zelle oben links zurueck.
      // Der Bot kann damit nur Feld 0 bespielen.
      return [{ move: 'clickCell', args: [0] }];
    },
  },
};`
    }));
  </script>

  <script id="enum-demo-board" type="module">
    display(gameBoard(demoCode, { showBot: true, showState: true,

  </script>

  <script id="play-md" type="text/markdown">
    ### `play` und `simulate`

    Sobald `enumerate` definiert ist, erscheinen über dem Spielfeld zwei Bot-Knöpfe —
    sie machen dasselbe wie der KI-Bereich im echten Debug Panel:

    - **🤖 play** — der Bot berechnet **einen** Zug und führt ihn aus.
    - **⏩ simulate** — der Bot spielt das **ganze Spiel** allein zu Ende.

    Mit `play` kannst du eigene Züge mit Bot-Zügen mischen: Mach selbst ein paar Züge
    und lass den Bot dann antworten.
  </script>

  <script id="uebung-md" type="text/markdown">
    ---

    ## Übung 🎯 — Einen richtigen Bot bauen

    Ändere `enumerate` so, dass es **alle möglichen** `clickCell`-Züge zurückgibt —
    also einen Zug für **jede leere Zelle** in `G.cells`.

    > 💡 Geh mit einem Loop durch `G.cells`. Ist eine Zelle `null`, dann ist ein Zug
    > auf diesen Index möglich: häng `{ move: 'clickCell', args: [index] }` an dein
    > Ergebnis-Array an.

    Wenn es klappt, spielt der Bot auf zufällige freie Felder — und mit ⏩ simulate
    läuft ein ganzes Spiel von allein bis zu Sieg oder Unentschieden durch.
  </script>

  <script id="uebung-board" type="module">
    display(gameBoard(botCode, { showDebug: true, showBot: true, showState: true,
      hint: "Drück ⏩ simulate — ein vollständiges Spiel sollte ohne Stecken­bleiben durchlaufen." }));
  </script>

  <script id="uebung-feedback" type="module">
    {
      let feedback;
      try {
        const game = loadGame(botCode);
        if (!game.ai || typeof game.ai.enumerate !== "function") {
          feedback = err(html`Es fehlt der <code>ai.enumerate</code>-Abschnitt.`);
        } else {
          const indicesFor = (cells) => {
            const res = game.ai.enumerate({ cells }, { currentPlayer: 0 }, 0);
            if (!Array.isArray(res)) return null;
            if (!res.every(m => m && m.move === "clickCell" && Array.isArray(m.args) && m.args.length === 1)) return "shape";
            return res.map(m => m.args[0]).sort((a, b) => a - b);
          };

          const empty = indicesFor([null, null, null, null, null, null, null, null, null]);
          const partial = indicesFor([0, null, 1, null, null, 1, null, 0, null]); // empty: 1,3,4,6,8

          const eq = (a, b) => Array.isArray(a) && a.length === b.length && a.every((v, i) => v === b[i]);

          if (empty === null || partial === null)
            feedback = err(html`<code>enumerate</code> muss ein <strong>Array</strong> von Zügen zurückgeben.`);
          else if (empty === "shape" || partial === "shape")
            feedback = err(html`Jeder Zug muss die Form <code>{ move: 'clickCell', args: [index] }</code> haben.`);
          else if (!eq(empty, [0, 1, 2, 3, 4, 5, 6, 7, 8]))
            feedback = err(html`Auf einem leeren Feld sollte <code>enumerate</code> <strong>9</strong> Züge zurückgeben (für jede Zelle einen) — du gibst ${empty.length} zurück.`);
          else if (!eq(partial, [1, 3, 4, 6, 8]))
            feedback = err(html`<code>enumerate</code> soll nur Züge für <strong>leere</strong> Zellen liefern. Erwartet: Felder 1, 3, 4, 6, 8 — bekommen: ${partial.join(", ") || "keine"}.`);
          else
            feedback = ok(html`🎉 Geschafft! Dein Bot kennt alle möglichen Züge und kann ein ganzes Spiel spielen. Probier ⏩ simulate!`);
        }
      } catch (e) {
        feedback = err(html`Dein Code lässt sich nicht ausführen: ${e.message}`);
      }
      display(feedback);
    }
  </script>
