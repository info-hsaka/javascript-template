  <script id="setup" type="module">
    import { createUI, installThemeToggle, installHashImportBanner, runTestCasesWithTimeout } from "./lib/helpers.js";

  <script id="intro" type="text/markdown">
    # 3. Siegbedingung 🏆

    Weiter in **derselben Datei**. Unser Tic-Tac-Toe endet bisher **nie** — selbst bei
    drei in einer Reihe läuft es weiter. Das ändern wir jetzt.

    Dafür brauchen wir zwei **Hilfsfunktionen** (sie stehen schon als Gerüst ganz oben
    in deiner Datei):

    1. `isDraw(cells)` — ist das Spiel unentschieden (alle Felder voll)?
    2. `isVictory(cells)` — hat jemand gewonnen, und wenn ja, wer?

    Diese beiden testen wir gleich einzeln, bevor wir sie ins Spiel einbauen.
  </script>

  <script id="editor-md" type="text/markdown">
    Hier ist wie immer deine Datei. Wir füllen jetzt die `TODO Kapitel 3` aus —
    erst `isDraw`, dann `isVictory`, dann `endIf`. Die Test-Boxen darunter prüfen
    `isDraw` und `isVictory` automatisch, sobald du **▶ Ausführen** drückst.
  </script>

  <script id="game-editor" type="module">
    const gameCode = view(codeEditor("bgio:game", {
      value: starter,
      label: "Deine Datei: TicTacToe.js"
    }));
  </script>

  <script id="isdraw-md" type="text/markdown">
    ## `isDraw` — ist das Spiel unentschieden?

    Schreib `isDraw(cells)` so, dass es `true` zurückgibt, wenn **alle** Zellen belegt
    sind (also keine mehr `null` ist), und sonst `false`.

    > 💡 Du musst nur prüfen, ob es **keine** `null` mehr im Array gibt. Ein `for`-Loop
    > über `cells` oder eine passende Array-Methode hilft.
  </script>

  <script id="isdraw-eval" type="module">
    const isDrawResult = runTestCasesWithTimeout({
      code: stripModuleSyntax(gameCode),
      fnName: "isDraw",
      cases: [
        [[["0", "1", "0", "1", "0", "1", "0", "1", "0"]], true],
        [[[null, "1", "0", "1", "0", "1", "0", "1", "0"]], false],
        [[["0", "1", "0", "1", "0", "1", "0", "1", null]], false],
        [[[null, null, null, null, null, null, null, null, null]], false],
        [[["1", "1", "1", "0", "0", "0", "1", "0", "1"]], true]
      ]
    });
  </script>

  <script id="isdraw-out" type="module">
    display(testReport(isDrawResult, "isDraw"));
  </script>

  <script id="isvictory-md" type="text/markdown">
    ## `isVictory` — hat jemand gewonnen?

    Ein Spieler gewinnt mit **drei gleichen Markierungen in einer Reihe** — horizontal,
    vertikal oder diagonal. Schreib `isVictory(cells)` so, dass es die Markierung des
    Gewinners (`"0"` oder `"1"`) zurückgibt, falls es einen gibt, und sonst `null`.

    Stell dir die 9 Felder so vor — die Zahl ist der Index im Array:

    ```
    0 | 1 | 2
    ---------
    3 | 4 | 5
    ---------
    6 | 7 | 8
    ```

    > 💡 Es gibt genau **8 Gewinn-Linien**: 3 Zeilen, 3 Spalten, 2 Diagonalen. Leg dir
    > am besten eine Liste dieser Linien an (z. B. `[0,1,2]`, `[3,4,5]`, …, `[2,4,6]`)
    > und prüfe für jede: Sind die drei Felder gleich **und** nicht `null`? Dann ist
    > ihr Wert die Markierung des Gewinners.

    > ⚠️ **Achtung:** Vergleiche die Felder **miteinander** (nicht mit einer festen
    > Zahl) und prüf zusätzlich, dass das Feld nicht `null` ist — drei leere Felder
    > sind **kein** Sieg!
  </script>

  <script id="isvictory-eval" type="module">
    const isVictoryResult = runTestCasesWithTimeout({
      code: stripModuleSyntax(gameCode),
      fnName: "isVictory",
      cases: [
        [[["0", "0", "0", null, "1", "1", null, null, null]], "0"],
        [[["1", "0", null, "1", "0", null, "1", null, null]], "1"],
        [[["0", "1", null, "1", "0", null, null, null, "0"]], "0"],
        [[["0", "0", "1", null, "1", null, "1", null, null]], "1"],
        [[["0", "1", "0", "1", "0", "1", "1", "0", "1"]], null],
        [[[null, null, null, null, null, null, null, null, null]], null]
      ]
    });
  </script>

  <script id="isvictory-out" type="module">
    display(testReport(isVictoryResult, "isVictory"));
  </script>

  <script id="endif-md" type="text/markdown">
    ## `endIf` — das Spiel beenden

    Jetzt verdrahten wir die beiden Funktionen. boardgame.io ruft `endIf` nach
    **jeder** Zustandsänderung auf, um zu prüfen, ob das Spiel vorbei ist.

    ```js
    endIf: function endIf(endIf) {
      const winner = isVictory(endIf.G.cells);
      if (winner != null) {
        return { winner: winner };
      }
      if (isDraw(endIf.G.cells)) {
        return { draw: true };
      }
    },
    ```

    > 📌 **Info** — `endIf` bekommt (wie ein Move) ein Objekt mit `G`. Gibt die Funktion
    > **irgendetwas** zurück, ist das Spiel vorbei und der Rückgabewert steht unter
    > `ctx.gameover`. Gibt sie nichts zurück, läuft das Spiel weiter. Damit später der
    > Bot funktioniert, sollte der Gewinner als `{ winner: ... }` zurückkommen.

    👉 **Deine Aufgabe:** Fülle das `TODO Kapitel 3` in `endIf` aus (nutze deine beiden
    Funktionen). Danach ist dein Spielfeld **vollständig spielbar**:
  </script>

  <script id="game-board" type="module">
    display(gameBoard(gameCode, {
      showState: true,
      hint: "Spiel ein paar Runden: Gewinne mit drei in einer Reihe oder füll das ganze Feld für ein Unentschieden — das Spiel sollte jetzt enden."
    }));
  </script>

  <script id="uebung-md" type="text/markdown">
    ---

    ## Übung 🎯 — Das vollständige Spiel

    Die Auswertung spielt zwei komplette Partien gegen dein Spiel: eine mit Gewinner
    und eine, die unentschieden endet.
  </script>

  <script id="uebung-feedback" type="module">
    {
      let feedback;
      try {
        const game = loadGame(gameCode);

        const winClient = makeClient(game);
        if (!(winClient.getState() && winClient.getState().G && Array.isArray(winClient.getState().G.cells)))
          throw new Error("setup gibt noch kein { cells: [...] } zurück (Kapitel 1).");
        for (const i of [0, 3, 1, 4, 2]) winClient.moves.clickCell(i);
        const go1 = winClient.getState().ctx.gameover;
        const wonByZero = go1 && go1.winner === "0";

        const drawClient = makeClient(game);
        for (const i of [0, 1, 2, 4, 3, 5, 7, 6, 8]) drawClient.moves.clickCell(i);
        const go2 = drawClient.getState().ctx.gameover;
        const drew = go2 && go2.draw === true;

        if (!wonByZero)
          feedback = err(html`Drei in einer Reihe sollten das Spiel beenden — prüf <code>isVictory</code> und ob <code>endIf</code> <code>{ winner: ... }</code> zurückgibt.`);
        else if (!drew)
          feedback = err(html`Ein volles Feld ohne Gewinner sollte unentschieden enden — prüf <code>isDraw</code> und ob <code>endIf</code> <code>{ draw: true }</code> zurückgibt.`);
        else
          feedback = ok(html`🎉 Perfekt! Dein Spiel erkennt Siege <em>und</em> Unentschieden. Du hast ein vollständiges Tic-Tac-Toe!`);
      } catch (e) {
        feedback = err(html`Dein Code lässt sich nicht ausführen: ${e.message}`);
      }
      display(feedback);
    }
  </script>
