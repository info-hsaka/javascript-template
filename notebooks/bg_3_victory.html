  <script id="intro" type="text/markdown">
    # 3. Siegbedingung 🏆

    Unser Tic-Tac-Toe endet bisher **nie** — selbst wenn jemand drei in einer Reihe
    hat, läuft das Spiel weiter. Das ändern wir jetzt.

    Dafür müssen wir zwei Dinge herausfinden:

    1. Ist das Spiel **unentschieden** (alle Felder voll, kein Gewinner)?
    2. Hat ein Spieler **gewonnen** — und wenn ja, welcher?

    Für beides schreiben wir je eine **Hilfsfunktion**. Hilfsfunktionen sind ganz
    normale Funktionen neben dem `TicTacToe`-Objekt in derselben Datei.
  </script>

  <script id="isdraw-md" type="text/markdown">
    ## `isDraw` — ist das Spiel unentschieden?

    Tic-Tac-Toe endet oft unentschieden. Schreib eine Funktion `isDraw(cells)`, die
    `true` zurückgibt, wenn **alle** Zellen gefüllt sind (also keine mehr `null`),
    und sonst `false`.

    > 💡 Eine leere Zelle ist `null`. Du musst also nur prüfen, ob es **keine** `null`
    > mehr im Array gibt. Ein `for`-Loop über `cells` oder eine passende Array-Methode
    > hilft dir.
  </script>

      value: `function isDraw(cells) {
  // Gib true zurueck, wenn alle Zellen gefuellt sind (keine ist null),
  // sonst false.
}`
    }));
  </script>

  <script id="isdraw-eval" type="module">
    const isDrawResult = runTestCasesWithTimeout({
      code: isDrawCode,
      fnName: "isDraw",
      cases: [
        [[[0, 1, 0, 1, 0, 1, 0, 1, 0]], true],
        [[[null, 1, 0, 1, 0, 1, 0, 1, 0]], false],
        [[[0, 1, 0, 1, 0, 1, 0, 1, null]], false],
        [[[null, null, null, null, null, null, null, null, null]], false],

      ]

  <script id="isvictory-md" type="text/markdown">
    ## `isVictory` — hat jemand gewonnen?

    In Tic-Tac-Toe gewinnt ein Spieler, wenn er **drei seiner Markierungen in einer
    Reihe** hat — horizontal, vertikal oder diagonal.

    Schreib eine Funktion `isVictory(cells)`, die die `playerID` des Gewinners
    zurückgibt (`0` oder `1`), falls es einen gibt, und sonst `null`.

    Stell dir die 9 Felder so angeordnet vor — die Zahl ist jeweils der Index im
    Array:

    ```
    0 | 1 | 2
    ---------
    3 | 4 | 5
    ---------
    6 | 7 | 8
    ```

    > 💡 Es gibt genau **8 Gewinn-Linien**: 3 Zeilen, 3 Spalten und 2 Diagonalen. Für
    > jede Linie prüfst du: Sind alle drei Felder belegt **und** gleich? Dann ist der
    > Wert dieser Felder die `playerID` des Gewinners.

    > ⚠️ Achtung: Drei leere Felder (`null, null, null`) sind **kein** Sieg! Prüf
    > immer zusätzlich, dass das erste Feld der Linie nicht `null` ist.
  </script>

  <script id="isvictory-editor" type="module">

      value: `function isVictory(cells) {
  // Pruefe jede der 8 Gewinn-Linien (3 Zeilen, 3 Spalten, 2 Diagonalen).
  // Gib die playerID (0 oder 1) des Gewinners zurueck, falls es einen gibt.
  // Sonst gib null zurueck.
}`
    }));
  </script>

        [[[0, 1, null, 1, 0, null, null, null, 0]], 0],
        [[[0, 0, 1, null, 1, null, 1, null, null]], 1],
        [[[0, 1, 0, 1, 0, 1, 1, 0, 1]], null],
        [[[null, null, null, null, null, null, null, null, null]], null]
      ]
    });
  </script>

  <script id="isvictory-out" type="module">

  <script id="endif-md" type="text/markdown">
    ## `endIf` — das Spiel beenden

    Jetzt haben wir die beiden Hilfsfunktionen. Wir hängen unserem Spiel eine
    **`endIf`-Methode** an. boardgame.io ruft sie nach **jeder** Zustandsänderung auf,
    um zu prüfen, ob das Spiel vorbei ist.

    ```js
    endIf: function endIf(endIf) {
      const winner = isVictory(endIf.G.cells);
      if (winner != null) {
        return { winner: winner };
      }
      if (isDraw(endIf.G.cells)) {
        return { draw: true };
      }
    },
    ```

    > 📌 **Info** — `endIf` bekommt (wie ein Move) ein Objekt mit `G`. Wenn die
    > Funktion **irgendetwas** zurückgibt, endet das Spiel, und der Rückgabewert steht
    > danach unter `ctx.gameover`. Gibt sie `undefined` zurück (gar kein `return`),
    > läuft das Spiel weiter. Damit später der Bot funktioniert, sollte der Gewinner
    > als Objekt mit `winner`-Schlüssel zurückgegeben werden.
  </script>

  <script id="uebung-md" type="text/markdown">
    ---

    ## Übung 🎯 — Das vollständige Spiel

    Bring jetzt alles zusammen. Unten ist das **komplette** `TicTacToe`-Spiel mit
    `setup`, `moves` und `turn` aus den letzten Kapiteln. Fülle die drei noch fehlenden
    Teile aus:

    1. **`isDraw(cells)`** — `true`, wenn alle Felder voll sind.
    2. **`isVictory(cells)`** — `playerID` des Gewinners oder `null`.
    3. **`endIf`** — nutzt die beiden Funktionen (siehe oben) und gibt `{ winner }`
       bzw. `{ draw: true }` zurück.

    Sobald es stimmt, ist das Spielfeld darunter **vollständig spielbar** und endet mit
    Sieg oder Unentschieden!
  </script>

  <script id="uebung-board" type="module">
    display(gameBoard(finalCode, { showState: true,
      hint: "Spiel ein paar Runden durch — gewinne in einer Reihe oder füll das ganze Feld für ein Unentschieden." }));
  </script>

  <script id="uebung-feedback" type="module">
    {
      let feedback;
      try {
        // Win: player 0 takes the top row (0,1,2), player 1 plays elsewhere.
        const winEngine = createEngine(loadGame(finalCode));
        for (const i of [0, 3, 1, 4, 2]) winEngine.makeMove("clickCell", i);
        const wonByZero = winEngine.ctx.gameover && winEngine.ctx.gameover.winner === 0;

        // Draw: fill the whole board with no three-in-a-row.
        const drawEngine = createEngine(loadGame(finalCode));
        for (const i of [0, 1, 2, 4, 3, 5, 7, 6, 8]) drawEngine.makeMove("clickCell", i);
        const drew = drawEngine.ctx.gameover && drawEngine.ctx.gameover.draw === true;

        if (!wonByZero)
          feedback = err(html`Drei in einer Reihe sollten das Spiel beenden — prüf <code>isVictory</code> und ob <code>endIf</code> <code>{ winner: ... }</code> zurückgibt.`);
        else if (!drew)
          feedback = err(html`Ein volles Feld ohne Gewinner sollte unentschieden enden — prüf <code>isDraw</code> und ob <code>endIf</code> <code>{ draw: true }</code> zurückgibt.`);
        else
          feedback = ok(html`🎉 Perfekt! Dein Spiel erkennt Siege <em>und</em> Unentschieden. Du hast ein vollständiges Tic-Tac-Toe!`);
      } catch (e) {
        feedback = err(html`Dein Code lässt sich nicht ausführen: ${e.message}`);
      }
      display(feedback);
    }
  </script>
