  <script id="intro" type="text/markdown">
    # Kommentare 💬

    Langsam wird der Code, den wir schreiben, komplexer. Um auch längeren und
    komplizierteren Code lesbar und verständlich zu machen, gibt es sogenannte
    **Comments** (Kommentare).

    Ein Kommentar ist eine Codezeile, die **nichts tut** — sie wird vom Computer
    ignoriert und dient nur dazu, Menschen das Lesen von Code zu vereinfachen.

    Kommentare in JavaScript fangen mit `//` an. Ein Beispiel:
  </script>

  <script id="comments-demo" type="module">
    const demo = view(codeEditor("comments:demo", {
      value: '// Hier passiert die Begrüßung\nconst name = "Anna" // der Name der Person\nconsole.log("Hallo, " + name + "!")\n\n// const ungenutzt = "wird nie ausgeführt"\n// console.log("Auch das hier ist auskommentiert")'
    }));
  </script>

  <script id="comments-out" type="module">
    display(consoleOutput(runWithConsole(demo)));
  </script>

  <script id="quartal-md" type="text/markdown">
    Hier ist ein etwas größeres Beispiel, in dem Kommentare den Code erklären. Mach dir keine Gedanken falls du die verwendeten Konstrukte `if` und `else` noch nicht kennst. Die kommen direkt im nächsten Abschnitt.
  </script>

  <script id="quartal-demo" type="module">
    const demo_q = view(codeEditor("comments:quartal", {
      value: 'const month = 8\n// Quartal als String\nlet quarter\nif (month < 4) {\n  // Januar bis März\n  quarter = "Q1"\n} else if (month < 7) {\n  // April bis Juni\n  quarter = "Q2"\n} else if (month < 10) {\n  // Juli bis September\n  quarter = "Q3"\n} else if (month < 13) {\n  // Oktober bis Dezember\n  quarter = "Q4"\n} else {\n  // Monate über 12 machen keinen Sinn...\n  console.log("Das ist kein Monat...")\n}\n// Gib das Quartal aus, wird undefined ausgeben wenn der Monat auf > 12 gesetzt war\nconsole.log(quarter)'
    }));
  </script>

  <script id="quartal-out" type="module">
    display(consoleOutput(runWithConsole(demo_q)));
  </script>

  <script id="quartal-md2" type="text/markdown">
    Dieser Code tut exakt das Gleiche, wenn man alle Zeilen, die mit `//` beginnen,
    entfernt — aber er ist deutlich besser lesbar und erklärt.
