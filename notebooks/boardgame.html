  <script id="online-md" type="text/markdown">
    ## Kein Setup nötig 🚀

    In der „klassischen“ Variante dieses Tutorials musstest du ein Template-Repository
    klonen, mit `npm i` jede Menge Programme installieren und einen Entwicklungsserver
    auf `http://localhost:3000` starten, um dein Spiel zu sehen.

    **Das brauchst du hier nicht.** Es läuft das **echte boardgame.io** direkt im
    Browser — dieselbe Bibliothek wie im echten Projekt, nur ohne Server und ohne
    Installation. Du schreibst genau denselben Code, und statt `localhost:3000`
    erscheint hier direkt ein **klickbares Spielfeld**, auf dem dein Code läuft.

    > 📌 **Info** — Das Einzige, was wir dir abnehmen, ist das **Zeichnen** des
    > Spielfelds (das macht man im echten Projekt z. B. mit React). Die **Spiellogik**,
    > um die es in diesem Tutorial geht, schreibst du komplett selbst — und sie ist
    > exakt dieselbe wie im echten Projekt.

    ### Eine Datei, Kapitel für Kapitel 📄

    Du arbeitest das ganze Tutorial über an **einer einzigen Datei** `TicTacToe.js`.
    Sie startet als Gerüst mit `TODO`-Kommentaren, und in jedem Kapitel füllst du den
    nächsten Teil **selbst** aus. Deine Datei wird automatisch gespeichert und wandert
    mit dir von Kapitel zu Kapitel — am Ende hast du das vollständige Spiel selbst
    geschrieben.
  </script>

  <script id="concepts-md" type="text/markdown">
    ## Worum geht's bei boardgame.io?

    boardgame.io ist ein Framework, um **rundenbasierte Spiele** zu bauen. Die Idee:
    Du beschreibst dein Spiel als ein einfaches JavaScript-Objekt, und das Framework
    kümmert sich um den Rest — Spielerwechsel, Spielstände, Netzwerk-Multiplayer und
    sogar einen Bot.

    Die zwei wichtigsten Begriffe, die dich durch das ganze Tutorial begleiten:

    > 📌 **`G`** — der **Spielzustand** (*game state*). Ein ganz normales
    > JavaScript-Objekt, das alles enthält, was das Spiel gerade ausmacht. Bei
    > Tic-Tac-Toe ist das die Belegung der 9 Felder.

    > 📌 **Move** — ein **Spielzug**. Eine Funktion, die beschreibt, wie ein Spieler
    > `G` verändert. Bei Tic-Tac-Toe: „setze meine Markierung in dieses Feld“.
