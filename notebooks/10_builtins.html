  <script id="intro" type="text/markdown">
    # Advanced Strings & Builtins 🔤

    Strings haben — wie Arrays — viele **builtin Funktionen und Properties**, die
    häufige Aufgaben erleichtern. Außerdem gibt es eine **schickere Schreibweise**
    für Strings, die dynamisch aus Daten zusammengebaut werden: **Template Strings**.
  </script>

  <script id="template-md" type="text/markdown">
    ## Template Strings

    Bisher haben wir Strings immer nur fest aufgeschrieben und ausgegeben. Häufig will
    man aber Strings **dynamisch aus Daten** zusammenbauen — z.B. um in der Konsole
    statt mehrerer Zeilen einen ganzen Satz auszugeben.

    Mit dem `+`-Operator geht das, wird aber schnell unleserlich:

    ```js
    const greeting = "Hallo " + name + ", du bist " + age + " Jahre alt."
    ```

    Eleganter: **Template Strings**. Sie werden wie normale Strings geschrieben, mit
    zwei Änderungen:

    - Statt `"..."` werden sie mit Backticks `` `...` `` geschrieben
    - Mitten im String können andere Werte eingesetzt werden, indem man sie mit
      `$\{...}` umschließt
  </script>

  <script id="template-demo" type="module">
    const demo_template = view(codeEditor("builtins:template", {
      value: 'const name = "Sara"\nconst age = 17\n\n// Mit Plus:\nconsole.log("Hallo " + name + ", du bist " + age + " Jahre alt.")\n\n// Mit Template String:\nconsole.log(`Hallo ${name}, du bist ${age} Jahre alt.`)\n\n// Du kannst auch Ausdrücke einbauen:\nconsole.log(`Nächstes Jahr wirst du ${age + 1}.`)'
    }));
  </script>

  <script id="template-out" type="module">
    display(consoleOutput(await runWithConsole(demo_template)));
  </script>

  <script id="escape-md" type="text/markdown">
    ## Special Characters & Escaping

    Es gibt ein paar besondere Zeichen, die du in deine Strings einbauen kannst —
    jeweils mit einem vorangestellten **Backslash `\`**:

    - `\n` für einen Zeilenumbruch
    - `\"` für ein `"` (in einem mit `"..."` umschlossenen String)
    - `\\` für einen echten Backslash `\`
  </script>

  <script id="escape-demo" type="module">
    const demo_escape = view(codeEditor("builtins:escape", {
      value: 'console.log("Zeile 1\\nZeile 2")\nconsole.log("Sie sagte: \\"Hi\\".")\nconsole.log("Pfad: C:\\\\Users\\\\Anna")'
    }));
  </script>

  <script id="escape-out" type="module">
    display(consoleOutput(await runWithConsole(demo_escape)));
  </script>

  <script id="builtin-intro-md" type="text/markdown">
    ## Builtin String Methods

    In JavaScript gibt es eine ganze Menge sogenannter **builtin Methods**. Eine
    Method ist eine spezielle Art von Funktion, die "auf einem Wert liegt" und auf
    diesen zugreift. Das klingt sehr abstrakt, heißt aber nur: man kann auf manchen
    Werten mit einem `.` getrennt auf bestimmte nützliche Dinge zugreifen.

    Zusätzlich zu Methods gibt es auch **builtin Properties**. Diese funktionieren
    genauso, sind aber keine Funktionen, sondern direkt feste Werte.

    ### `.length`

    Strings haben — wie Arrays — eine `.length`-Property, die die Anzahl der Zeichen
    als Zahl enthält:
  </script>

  <script id="length-demo" type="module">
    const demo_length = view(codeEditor("builtins:length", {
      value: 'console.log("Hallo".length)        // 5\nconsole.log("".length)             // 0\nconsole.log("Mit Leerzeichen".length) // 15'
    }));
  </script>

  <script id="length-out" type="module">
    display(consoleOutput(await runWithConsole(demo_length)));
  </script>

  <script id="search-md" type="text/markdown">
    ## Suchen in Strings

    - **`.startsWith(s)`** — `true`, wenn der String mit `s` anfängt
    - **`.endsWith(s)`** — `true`, wenn er mit `s` aufhört
    - **`.includes(s)`** — `true`, wenn `s` irgendwo enthalten ist
    - **`.indexOf(s)`** — Position von `s`, oder `-1` wenn nicht enthalten
  </script>

  <script id="search-demo" type="module">
    const demo_search = view(codeEditor("builtins:search", {
      value: 'const greeting = "Hallo Welt"\n\nconsole.log(greeting.startsWith("Hallo")) // true\nconsole.log(greeting.endsWith("Mond"))    // false\nconsole.log(greeting.includes("Welt"))    // true\nconsole.log(greeting.indexOf("Welt"))     // 6\nconsole.log(greeting.indexOf("Mars"))     // -1'
    }));
  </script>

  <script id="search-out" type="module">
    display(consoleOutput(await runWithConsole(demo_search)));
  </script>

  <script id="substring-md" type="text/markdown">
    ## `.substring(start, end)` — Ausschnitt

    `.substring` schneidet einen Teil aus einem String aus — von Index `start`
    (inklusive) bis Index `end` (exklusive). Wie bei Arrays mit `.slice`.
  </script>

  <script id="substring-demo" type="module">
    const demo_sub = view(codeEditor("builtins:substring", {
      value: 'const text = "JavaScript"\n\nconsole.log(text.substring(0, 4))  // "Java"\nconsole.log(text.substring(4))     // "Script" — ohne Ende-Index\nconsole.log(text.substring(4, 6))  // "Sc"'
    }));
  </script>

  <script id="substring-out" type="module">
    display(consoleOutput(await runWithConsole(demo_sub)));
  </script>

    ## Übung 1 🎯 — Anrede kürzen

    Schreib eine Funktion `removeSalutation(name)` und exportiere sie. Sie soll aus
    einem vollen Namen die Anrede wegkürzen und das Ergebnis returnen. Das heißt:

    > - `"Fr. Black Widow"` wird zu `"Black Widow"`
    > - `"Hr. Hulk"` wird zu `"Hulk"`
    > - `"Thor"` wird zu `"Thor"`
  </script>

  <script id="uebung2-md" type="text/markdown">
    ---

    ## Übung 2 🎯 — Entfernen von beliebigem String

    Schreib eine **exportierte** Funktion `removeString(subject, needle)`, die zwei
    Strings erwartet. Sie soll im ersten String alle Vorkommnisse des zweiten Strings
    entfernen und den resultierenden String zurückgeben. **Benutze dabei nur die
    Builtins, die in diesem Kapitel beschrieben wurden** — keine Regex.

    > Deine Funktion sollte sich folgendermaßen verhalten:
    > - `("FooBarFoo", "Foo")` wird zu `"Bar"`
    > - `("Man darf auf der Akademie nicht Geschi sagen", "Geschi")` wird zu `"Man darf auf der Akademie nicht  sagen"` (beachte: zwei Leerzeichen, da "Geschi" raus ist)
    > - `("Info ist der beste Kurs", "Mathe")` wird zu `"Info ist der beste Kurs"`

    <details><summary>💡 Tipp anzeigen</summary>

    - Mit `.indexOf` findest du die Position des nächsten Vorkommens.
    - Mit `.substring` schneidest du den Teil davor und den Teil danach raus und
      klebst sie zusammen.
    - Eine `while`-Schleife wiederholt das, bis nichts mehr gefunden wird (`.indexOf`
      gibt dann `-1` zurück).

    </details>
  </script>
