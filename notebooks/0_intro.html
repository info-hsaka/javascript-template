  <script id="was-md" type="text/markdown">
    ## Was ist Programmieren?

    Programmieren ist das **Formulieren von Anweisungen** an einen Computer in einer
    Programmiersprache.

    Hierbei willst du irgendein Ziel erreichen, überlegst dir, wie das mit einem
    Computer möglich ist, wie die einzelnen Schritte aussehen und schreibst das dann
    als Anweisungen nieder.

    Der **wichtigste Schritt** beim Programmieren ist also das Denken und Übersetzen
    eines Problems in der "echten Welt" in eine Struktur in der Computerwelt — nicht
    das eigentliche Aufschreiben in einer Programmiersprache.

    Für diesen Kurs programmieren wir in der Sprache **JavaScript**.
  </script>

  <script id="warum-md" type="text/markdown">
    ## Warum JavaScript?

    JavaScript ist die **aktuell größte Programmiersprache der Welt**. Das liegt daran,
    dass es die einzige Sprache ist, die direkt von Webbrowsern (mit denen du
    Internetseiten benutzt) ausgeführt wird. Auch wir werden im Laufe der HSAKA diese
    Eigenschaft nutzen.
  </script>

  <script id="wie-md" type="text/markdown">
    ## Wie funktioniert JavaScript?

    JavaScript-Dateien sind **einfache Textdateien**, die direkt ausgeführt werden
    können. Dabei wird die Datei Zeile für Zeile gelesen und die Anweisungen werden
    nacheinander ausgeführt — wie ein Ablaufplan oder ein Kochrezept.

    > 📌 **Info** — Solche Dateien nennt man **Skripte** (*Scripts*), und Programmier­sprachen,
    > in denen Textdateien direkt ausgeführt werden, nennt man **Skriptsprachen**.

    Die ersten solcher Anweisungen lernst du im ersten Kapitel des Tutorials.
  </script>

  <script id="ziele-md" type="text/markdown">
    ---

    # Ziele 🎯

    Das Ziel dieses Tutorials ist es, dir die **Grundlagen des Programmierens** anhand
    der Programmiersprache JavaScript zu vermitteln. Allerdings sind praktisch alle
    vermittelten Konzepte auf nahezu jede andere Programmiersprache übertragbar.

    Wir behandeln bewusst nur einen ausgewählten Teil der Sprache — falls du schon mal
    programmiert hast, wird dir auffallen, dass wir gewisse Konstrukte auslassen.
    Dennoch reichen alle beschriebenen Konstrukte aus, um alle im Kurs relevanten
    Probleme (und auch die meisten darüber hinaus) zu lösen.

    Wir verwenden im gesamten Tutorial bewusst **sehr einfache und "unwissenschaftliche"
    Sprache**. Wir glauben, dass neue Denkmuster am besten simpel, direkt und ohne
    Fachjargon erklärt werden. Allerdings lässt es sich nicht vermeiden, dass wir ein
    paar Fachwörter benutzen — diese versuchen wir immer explizit einzuführen und zu
    erklären.

    Wir werden zudem ausgiebig und absolut unkorrekt **denglischen** —
    Programmierjargon ist, wie praktisch alles, was du an Material zu dem Thema finden
    wirst, englisch. Manche Begriffe haben deutsche Übersetzungen, manche nicht. Wir
    werden es so tun, wie es Programmierer:innen im Berufsalltag auch tun: deutsche
    und englische Schreibweisen, Grammatik und Mischformen werden gemischt.
  </script>

  <script id="trial-md" type="text/markdown">
    ## Trial & Error

    Wenn du noch nie programmiert hast: **sei nicht frustriert**, wenn neue Konzepte,
    das Lesen von Code oder das Nachvollziehen von Fehlern nicht sofort klappen.

    Programmieren-Lernen heißt vor allem, **eine neue Art zu denken** zu lernen. Der
    Computer kann ein frustrierender Partner sein, der sehr exakt tut, was man sagt —
    nicht, was man meint.

    Es ist beim Programmieren außerdem **völlig normal**, zunächst nicht zu wissen,
    was die Lösung ist, oder das Gefühl zu haben, nicht weiterzukommen. Wildes
    Ausprobieren und gefühlt im Leeren rumstochern, bis man eine Erleuchtung hat,
    ist ein absolut normaler Teil des Prozesses — und kommt auch nach vielen Jahren
    Erfahrung in dem Gebiet ständig vor.
  </script>
