  <script id="share-md" type="text/markdown">
    ---

    ## Fortschritt teilen

    Wenn du fertig bist, kannst du deine kompletten Lösungen als Datei exportieren
    und uns schicken — dann sehen wir deine Antworten.
  </script>

  <script id="share-controls" type="module">
    import { downloadAsFile, importFromFile, exportAll } from "./lib/progress.js";

    function makeButton(label, onClick) {
      const btn = html`<button style="
        font: 500 14px/1 var(--sans-serif);
        padding: .55em 1em;
        border: 1px solid var(--theme-foreground-faintest);
        border-radius: .4em;
        background: var(--theme-background);
        color: var(--theme-foreground);
        cursor: pointer;
        margin-right: .5em;
      ">${label}</button>`;
      btn.addEventListener("click", onClick);
      return btn;
    }

    const status = html`<div style="margin-top:.6em;min-height:1.5em"></div>`;

    function setStatus(node) {
      status.innerHTML = "";
      if (node) status.appendChild(node);
    }

    const downloadBtn = makeButton("💾 Lösungen herunterladen", () => {
      if (Object.keys(exportAll()).length === 0) {
        setStatus(html`<div style="color:var(--theme-foreground-muted)">Du hast noch keine Lösungen — bearbeite erst eine Übung.</div>`);
        return;
      }
      downloadAsFile();
      setStatus(html`<div class="feedback feedback-ok" style="display:inline-block">✅ <code>fortschritt.json</code> heruntergeladen — schick uns die Datei per Mail oder Discord.</div>`);
    });

    const fileInput = html`<input type="file" accept=".json,application/json" style="display:none">`;
    fileInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const data = await importFromFile(file);
        setStatus(html`<div class="feedback feedback-ok" style="display:inline-block">✅ ${Object.keys(data).length} Einträge importiert. Lade eine Übungs-Seite, um deine Lösungen zu sehen.</div>`);
      } catch (err) {
        setStatus(html`<div class="feedback feedback-err" style="display:inline-block">❌ Datei konnte nicht gelesen werden: ${err.message}</div>`);
      }
    });

    const importFileBtn = makeButton("📂 Lösungen importieren", () => fileInput.click());

    display(html`<div style="margin:.5em 0">
      <div style="margin-bottom:.5em">${downloadBtn}${importFileBtn}${fileInput}</div>
      ${status}
    </div>`);
  </script>

  <script id="howto" type="text/markdown">

    ## So funktioniert's

    - Klick auf eine Übung oben.
    - Lies die Erklärung und probier den Code aus, indem du ihn im Code-Feld änderst.

    - Du kannst jederzeit zurückkommen — alle Eingaben bleiben gespeichert.

    > 💡 Tipp: Funktioniert am besten in Chrome, Firefox oder Edge.
  </script>
