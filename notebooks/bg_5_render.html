  <title>boardgame.io 5 — Das Spielbrett zeichnen</title>

  <script id="styles" type="text/html">
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" type="image/svg+xml" href="./favicon.svg">

  <script id="setup" type="module">
    import { createUI, installThemeToggle, installHashImportBanner } from "./lib/helpers.js";
    import { createGameUI, finaleStarter } from "./lib/bgio.js";
    installThemeToggle({ html, display });
    installHashImportBanner({ html, display });
    const { codeEditor, canvasTestReport } = createUI({ html });
    const { gameCanvas, gameCanvasTest, mountEditor, mountGameSection, sectionLabel } = createGameUI({ html });
    // Das Finale zeigt ALLES in einer Datei: deine Spiellogik (TicTacToe) aus den
    // vorigen Kapiteln plus die neue draw-Funktion, die das Brett zeichnet. Wenn
    // deine eigene TicTacToe.js laeuft, nehmen wir die als Startpunkt -- sonst
    // eine funktionierende Reserve-Version -- und haengen das draw-Geruest an.
    const starter = finaleStarter();
  </script>

  <script id="panel" type="module">
    const editor = codeEditor("bgio:finale", { value: starter, label: "Deine Datei: TicTacToe.js" });
    const boardSlot = html`<div></div>`;
    const feedbackSlot = html`<div></div>`;

    const CHECKS = [
      { name: "draw(G, gameover) beginnt mit resetOnClicks()", run: ({ base }) => ({
          passed: base.resetCount >= 1,
          detail: base.resetCount >= 1 ? "resetOnClicks() wird aufgerufen" : "resetOnClicks() fehlt am Anfang von draw"
      }) },
      { name: "Das 3×3-Gitter ist zu sehen", run: ({ base }) => {
          const n = base.nonBg();
          return { passed: n > 100, detail: `${n} gezeichnete Pixel` };
      } },
      { name: "Markierungen aus G.cells werden gezeichnet", run: ({ probe }) => {
          const p = probe({ cells: ["0", null, null, null, "1", null, null, null, null] });
          const a = p.cellInk(0), b = p.cellInk(4), leer = p.cellInk(1);
          return {
            passed: a > 15 && b > 15 && leer < 8,
            detail: `Zelle 0 (✕): ${a}, Zelle 4 (◯): ${b}, leere Zelle: ${leer}`
          };
      } },
      { name: "Jede Zelle ist anklickbar und löst den richtigen Zug aus", run: ({ probe }) => {
          const p = probe();
          for (let i = 0; i < 9; i++) p.clickAt((i % 3) * 100 + 50, Math.floor(i / 3) * 100 + 50);
          const got = new Set(p.moves);
          const all = [0, 1, 2, 3, 4, 5, 6, 7, 8].every(i => got.has(i));
          return {
            passed: all,
            detail: `clickCell-Aufrufe: ${[...got].sort((x, y) => x - y).join(", ") || "keine"}`
          };
      } },
      { name: "Das Spielende wird auf dem Brett angezeigt", run: ({ probe }) => {
          // Dieselbe Endstellung zweimal zeichnen: einmal ohne gameover (normales
          // Brett) und einmal mit gameover. Wer das Ergebnis anzeigt, malt im
          // zweiten Fall etwas Zusätzliches -- die Pixel unterscheiden sich dann.
          const cells = ["0", "0", "0", null, "1", null, "1", null, null];
          const ohne = probe({ cells, gameover: null });
          const mit = probe({ cells, gameover: { winner: "0" } });
          let diff = 0;
          for (let y = 0; y < 300; y += 5) {
            for (let x = 0; x < 300; x += 5) {
              const a = ohne.pixel(x, y), b = mit.pixel(x, y);
              if (Math.abs(a[0] - b[0]) + Math.abs(a[1] - b[1]) + Math.abs(a[2] - b[2]) > 40) diff++;
            }
          }
          return {
            passed: diff > 12,
            detail: diff > 12 ? `Bei gameover wird etwas Zusätzliches gezeichnet (${diff} Punkte)` : "draw zeichnet bei gameover nichts anderes — zeig Gewinner/Unentschieden an"
          };
      } }
    ];

    function rerun() {
      const code = editor.value;
      boardSlot.replaceChildren(gameCanvas(code, {
        width: 300,
        height: 300,
        hint: "Sobald alle 9 Zellen anklickbar sind, spielst du dein Tic-Tac-Toe komplett auf deinem eigenen Spielbrett — mit deiner eigenen Spiellogik dahinter."
      }));
      feedbackSlot.replaceChildren(canvasTestReport(gameCanvasTest(code, { checks: CHECKS }), "Übung"));
    }

    mountEditor({ editor, title: "TicTacToe.js" });
    const section = mountGameSection({
      nodes: [
        sectionLabel("Dein Spielbrett"), boardSlot,
        sectionLabel("Übung"), feedbackSlot
      ],
      onRun: () => { const b = editor.querySelector(".run-button"); if (b) b.click(); }
    });
    editor.addEventListener("input", () => { rerun(); section.expand(); });
    rerun();
  </script>

  <script id="intro" type="text/markdown">
    # 5. Das große Finale: dein Spiel in einer Datei 🎮

    Jetzt fließt alles zusammen. In den boardgame.io-Kapiteln hast du die komplette
    **Spiellogik** geschrieben — `setup`, `moves`, `turn`, `endIf` und sogar einen
    Bot. Im Canvas-Kurs hast du gelernt, **zu zeichnen** und auf **Klicks** zu
    reagieren. Hier kommt beides in **einer einzigen Datei** zusammen — und dann
    läuft dein Spiel vollständig auf deinem eigenen Brett.

    > 📌 **Alles in einer Datei.** **Rechts** im Editor siehst du diesmal die ganze
    > Datei: **oben** deine Spiellogik (`TicTacToe`) aus den vorigen Kapiteln,
    > **unten** die neue Funktion `draw`, die das Brett zeichnet. So hast du beide
    > Hälften deines Spiels an einem Ort vor Augen.
    >
    > Läuft deine Logik aus den Kapiteln 1–4 schon, steht hier **dein** Code. Hast
    > du sie noch nicht fertig, springt eine funktionierende Reserve-Version ein,
    > damit du dich hier ganz aufs Zeichnen konzentrieren kannst.

    > 💡 Du brauchst die **Canvas-Kapitel** als Grundlage: Rechtecke, Text, und vor
    > allem [Klicks](./canvas/6_clicks) mit `onClick` und `resetOnClicks`. Wir bauen
    > hier genau auf diesem Muster auf.
  </script>

  <script id="draw-md" type="text/markdown">
    ## Die `draw(G, gameover)`-Funktion

    Ganz unten in der Datei steht das Gerüst für die Funktion, die das Spielfeld
    malt: `draw`. Sie wird **exportiert** und bekommt zwei Dinge — den
    **Spielzustand** `G` und, sobald das Spiel vorbei ist, die **Spielende-Info**
    `gameover`. Deine Aufgabe ist, ihren Körper zu füllen.

    Den Zustand `G` kennst du längst: Bei Tic-Tac-Toe ist das ein Objekt mit dem
    Array `cells` und seinen **9 Feldern**. `draw` liest `G.cells` und malt daraus
    das Brett.

    > 📌 **So spielen die Konzepte zusammen** — In der Canvas-[Klicks](./canvas/6_clicks)-Übung
    > hattest du eine eigene `draw()`-Funktion, die du nach jeder Änderung neu aufgerufen
    > hast. Hier ist es **dasselbe Muster**, nur:
    >
    > - der Zustand steckt nicht mehr in einer eigenen Variablen, sondern in **`G`** —
    >   und der gehört boardgame.io;
    > - **du** rufst `draw` nicht selbst auf — das Framework ruft `draw(G, gameover)` nach
    >   **jedem Zug** automatisch mit dem neuen Zustand auf.

    Deshalb beginnt `draw` — wie in der Klicks-Übung — mit **`resetOnClicks()`**: Da `draw`
    bei jedem Zug erneut läuft und dabei neue Klick-Bereiche anlegt, müssen die alten vorher
    weg, sonst stapeln sie sich.
  </script>

  <script id="grid-md" type="text/markdown">
    ## Schritt 1: Das Gitter

    Fang mit dem **3×3-Gitter** an. Jede Zelle ist `feld` (= 100) Pixel groß, das Brett
    also 300 × 300.

    Nutze **zwei verschachtelte Schleifen** — eine für die Zeile (0, 1, 2) und eine für
    die Spalte (0, 1, 2). Die obere linke Ecke einer Zelle bekommst du, indem du Spalte
    und Zeile jeweils mit `feld` multiplizierst. Für jede Zelle zeichnest du dann mit
    `strokeRect` einen quadratischen Umriss der Größe `feld`. Das kennst du genau so aus
    der Canvas-Klick-Übung mit dem Raster.

    Drück **▶ Ausführen** — oben in der Spiel-Sektion sollte ein leeres Gitter erscheinen.
  </script>

  <script id="marks-md" type="text/markdown">
    ## Schritt 2: Die Markierungen aus `G.cells`

    Jetzt malst du, **was im Zustand steht**. Erinnerst du dich an die Nummerierung der
    Felder aus dem [Siegbedingungs-Kapitel](./bg_3_victory)? Genau die brauchst du wieder:

    ```
    0 | 1 | 2
    ---------
    3 | 4 | 5
    ---------
    6 | 7 | 8
    ```

    In `G.cells` steht an jeder Stelle entweder `null` (leer), `"0"` (Spieler ✕) oder
    `"1"` (Spieler ◯).

    Geh mit einer Schleife durch `G.cells`. Aus dem **Index** `i` rechnest du die Position
    der Zelle aus — genau wie beim Gitter: die **Spalte** ist der Rest von `i` geteilt
    durch 3, die **Zeile** ist `i` ganzzahlig durch 3 geteilt; mal `feld` ergibt das die
    obere linke Ecke. Steht an der Stelle `"0"`, zeichne ein **✕**, bei `"1"` ein **◯** —
    jeweils mittig in die Zelle. Leere Felder (`null`) überspringst du.

    > 💡 Wie genau du ✕ und ◯ zeichnest, ist dir überlassen: mit `fillText` (denk an
    > zentrierte Ausrichtung über `textAlign`/`textBaseline`), mit Linien aus
    > `moveTo`/`lineTo`, einem Kreis aus `arc` oder sogar einem `drawPicture`. Hauptsache,
    > man erkennt, **welcher** Spieler in welcher Zelle ist.
  </script>

  <script id="clicks-md" type="text/markdown">
    ## Schritt 3: Klicks sind Spielzüge

    Jetzt machst du das Brett **spielbar**. Dafür gibt es eine Brücke zwischen den beiden
    Welten:

    > 📌 **`onClick` trifft `clickCell`** — Mit `onClick(x, y, breite, höhe, handler)` legst
    > du wie gewohnt einen klickbaren Bereich über eine Zelle. Im `handler` rufst du
    > **`clickCell(index)`** auf — und das ist **genau der Move**, den du in
    > [Kapitel 1](./bg_1_game) geschrieben hast! Klickt jemand auf die Zelle, führt
    > boardgame.io den Move aus, aktualisiert `G`, wechselt mit deiner `turn`-Regel den
    > Spieler und prüft mit `endIf`, ob das Spiel vorbei ist. Danach ruft es **`draw(G, gameover)`
    > neu auf** — und dein Bild aktualisiert sich von selbst.

    Im Startcode ist die Zelle **oben links** (Index `0`) schon verdrahtet: ein
    `onClick`-Bereich über dieser Zelle ruft im Handler `clickCell(0)` auf.

    Probier's aus: Drück **▶ Ausführen** und klick im Brett oben links — dort wird eine
    Markierung gesetzt, der Rest bleibt tot. **Deine Aufgabe:** Leg für **alle** Zellen
    einen `onClick`-Bereich an, dessen Handler `clickCell` mit dem **passenden Index**
    aufruft. Am elegantesten geht das in **derselben Schleife**, in der du auch die
    Markierungen zeichnest — die obere linke Ecke und den Index der Zelle hast du dort ja
    schon ausgerechnet. Achte darauf, im Handler wirklich den Index *dieser* Zelle zu
    verwenden.

    > 💡 Weil du `onClick` hier in einer **Schleife** anlegst, deklariere die
    > Zählvariable mit **`let` direkt in der Schleife** (oder nimm `for ... of`) —
    > sonst klicken am Ende alle Zellen denselben Index. Das ist genau die Falle aus
    > dem [Klicks-Kapitel](./canvas/6_clicks).
  </script>

  <script id="gameend-md" type="text/markdown">
    ## Schritt 4: Das Spielende anzeigen 🏆

    Dein `endIf` aus dem [Siegbedingungs-Kapitel](./bg_3_victory) entscheidet, wann
    Schluss ist. Sein Ergebnis bekommt `draw` als zweiten Parameter **`gameover`**:

    - Solange gespielt wird, ist `gameover` **`null`** — dann zeichnest du das Brett
      ganz normal.
    - Ist das Spiel vorbei, steht in `gameover` das Ergebnis: **`gameover.winner`**
      ist der Gewinner (`"0"` oder `"1"`), und bei einem Unentschieden ist
      **`gameover.draw`** gleich `true`.

    **Deine Aufgabe:** Zeig das Ergebnis auf dem Brett an, sobald `gameover` gesetzt
    ist — zum Beispiel mit einem großen `fillText` über dem Spielfeld. Wie du es
    gestaltest, ist dir überlassen; Hauptsache, man erkennt, **wer gewonnen** hat (oder
    dass es unentschieden steht).

    ```javascript
    if (gameover) {
      // ... Ergebnis anzeigen, z. B. mit ctx.fillText(...)
    }
    ```

    > 💡 `gameover` ist nur dann „wahr", wenn das Spiel vorbei ist — während des Spiels
    > ist es `null`. Deshalb passt ein einfaches `if (gameover) { ... }` am Ende deiner
    > `draw`-Funktion perfekt.
  </script>

  <script id="wiring-md" type="text/markdown">
    ## Was dahinter passiert — die Verdrahtung 🔌

    Eine Frage bleibt: Woher weiß dein `draw`, *wann* es laufen soll? Und wie wird aus
    einem Klick aufs Canvas ein echter Spielzug? Das erledigt ein kleines Stück
    **Verdrahtung**, das wir dir abnehmen. Du schreibst es nicht selbst — aber es lohnt
    sich, einmal zu sehen, wie deine beiden Hälften zusammengesteckt werden:

    ```javascript
    // 1) boardgame.io bekommt deine Spiellogik und verwaltet ab jetzt den Zustand.
    const client = Client({ game: TicTacToe })
    client.start()

    // 2) Nach jeder Änderung zeichnen wir dein Brett neu -- mit dem AKTUELLEN
    //    Zustand G und der Spielende-Info gameover.
    function render() {
      const zustand = client.getState()
      draw(zustand.G, zustand.ctx.gameover)
    }
    client.subscribe(render)   // "ruf render auf, sobald sich etwas ändert"

    // 3) Ein echter Klick aufs Canvas sucht den passenden onClick-Bereich
    //    und ruft dessen handler auf.
    canvas.addEventListener("click", (event) => {
      // (Maus-Position in Canvas-Koordinaten umrechnen ...)
      for (const bereich of klickBereiche) {
        if (liegtInnerhalb(event, bereich)) {
          bereich.handler()
        }
      }
    })

    // 4) clickCell ist die Brücke: Es löst deinen Move in boardgame.io aus.
    //    Der Move ändert G, endIf prüft auf Sieg -- und durch (2) zeichnet
    //    sich dein Brett von selbst neu.
    function clickCell(i) {
      client.moves.clickCell(i)
    }
    ```

    > 💡 Das ist **derselbe Kreislauf** wie in der Klicks-Übung — „Zustand ändern,
    > dann neu zeichnen" — nur dass der Zustand jetzt in boardgame.io lebt und das
    > Neuzeichnen automatisch nach jedem Zug passiert.
  </script>

  <script id="uebung-md" type="text/markdown">
    ---

    ## Übung 🎯 — Dein eigenes Spielbrett

    Vervollständige `draw(G, gameover)` in deiner Datei, bis du ein vollständiges,
    spielbares Tic-Tac-Toe auf deinem eigenen Brett hast. Die Auswertung (in der
    Spiel-Sektion oben) prüft automatisch:

    1. `draw(G, gameover)` beginnt mit `resetOnClicks()`.
    2. Das 3×3-**Gitter** ist zu sehen.
    3. Die **Markierungen** kommen aus `G.cells` (richtiger Spieler in der richtigen Zelle).
    4. **Jede** Zelle ist anklickbar und ruft `clickCell` mit dem **richtigen Index** auf.
    5. Das **Spielende** wird angezeigt (Gewinner oder Unentschieden), sobald `gameover` gesetzt ist.

    Wenn alles passt, spiel ein paar Runden gegen dich selbst — und denk dran: dahinter
    läuft die Spiellogik, die du selbst geschrieben hast.

    > 💡 Klickt ein Zug ins Leere, obwohl du den Bereich angelegt hast? Mal den
    > klickbaren Bereich zur Kontrolle kurz mit einer auffälligen Farbe als Umriss
    > (`strokeRect` mit denselben vier Zahlen wie beim `onClick`) — genau wie im
    > Klick-Tipp aus dem Canvas-Kapitel. Liegt der Umriss genau auf der Zelle, passen die
    > Zahlen.
  </script>

    - Die **Spiellogik** (`setup`, `moves`, `turn`, `endIf`, `ai`) — aus den boardgame.io-Kapiteln.
