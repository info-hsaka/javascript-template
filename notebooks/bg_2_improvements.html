<notebook theme="air">
  <title>boardgame.io 2 — Spielverbesserungen</title>

  <script id="styles" type="text/html">
    <link rel="stylesheet" href="./style.css">
  </script>

  <script id="setup" type="module">
    import { createUI, installThemeToggle, installHashImportBanner } from "./lib/helpers.js";
    import { createGameUI, createEngine, loadGame } from "./lib/bgio.js";
    installThemeToggle({ html, display });
    installHashImportBanner({ html, display });
    const { codeEditor, ok, err, hint } = createUI({ html });
    const { gameBoard } = createGameUI({ html });
  </script>

  <script id="intro" type="text/markdown">
    # 2. Spielverbesserungen 🛠️

    Unser Spiel funktioniert schon — aber es hat zwei Macken:

    1. Man kann in ein **bereits belegtes Feld** klicken und es überschreiben.
    2. Der Zug wird **nie automatisch** an den nächsten Spieler übergeben.

    Beides bringen wir jetzt in Ordnung.
  </script>

  <script id="invalid-md" type="text/markdown">
    ## Spielzüge validieren — `INVALID_MOVE`

    Bisher überschreibt `clickCell` eine bereits ausgefüllte Zelle. Verhindern wir
    das: Wenn das gewählte Feld nicht `null` ist, soll der Zug als **ungültig**
    gelten.

    Ein Move teilt dem Framework mit, dass er ungültig ist, indem er eine spezielle
    Konstante `INVALID_MOVE` **zurückgibt**. Im echten Projekt importierst du sie oben
    in der Datei:

    ```js
    import { INVALID_MOVE } from 'boardgame.io/core';
    ```

    > 📌 **Info** — In diesem Notebook ist `INVALID_MOVE` bereits für dich verfügbar.
    > Die `import`-Zeile darfst du trotzdem stehen lassen — sie wird hier einfach
    > ignoriert, damit dein Code genauso aussieht wie im echten Projekt.

    Wenn ein Move `INVALID_MOVE` zurückgibt, verwirft boardgame.io den Zug komplett —
    `G` bleibt unverändert. Wir prüfen also **zuerst**, ob das Feld frei ist:
  </script>

  <script id="invalid-editor" type="module">
    const invalidCode = view(codeEditor("bgio:invalid", {
      value: `import { INVALID_MOVE } from 'boardgame.io/core';

export const TicTacToe = {
  setup: function setup() {
    return { cells: [null, null, null, null, null, null, null, null, null] }
  },

  moves: {
    clickCell: function clickCell(move, cellIndex) {
      // Ist das Feld schon belegt? Dann ist der Zug ungueltig.
      if (move.G.cells[cellIndex] !== null) {
        return INVALID_MOVE;
      }
      move.G.cells[cellIndex] = move.playerID;
    },
  },
};`
    }));
  </script>

  <script id="invalid-board" type="module">
    display(gameBoard(invalidCode, {
      showDebug: true,
      showState: true,
      hint: "Versuch, zweimal auf dasselbe Feld zu klicken — der zweite Klick wird jetzt abgelehnt. (Mit endTurn im Debug Panel kannst du den Spieler wechseln.)"
    }));
  </script>

  <script id="turn-md" type="text/markdown">
    ## Züge verwalten — das `turn`-Objekt

    Bisher mussten wir im Debug Panel von Hand auf `endTurn` klicken, um den Zug an
    den nächsten Spieler zu übergeben. In Tic-Tac-Toe wissen wir aber: Der Zug
    **sollte immer enden**, sobald ein Spielzug gemacht wurde.

    boardgame.io bietet dafür das `turn`-Objekt mit zwei nützlichen Optionen:

    - **`maxMoves: 1`** — der Zug eines Spielers endet automatisch nach **einem** Move.
    - **`minMoves: 1`** — ein Spieler **muss** mindestens einen Move machen und kann
      nicht einfach `endTurn` aufrufen.

    ```js
    turn: {
      minMoves: 1,
      maxMoves: 1,
    },
    ```

    Probier's aus: Jetzt wechselt nach jedem Klick automatisch der Spieler — ✕ und ◯
    im Wechsel:
  </script>

  <script id="turn-editor" type="module">
    const turnCode = view(codeEditor("bgio:turn", {
      value: `import { INVALID_MOVE } from 'boardgame.io/core';

export const TicTacToe = {
  setup: function setup() {
    return { cells: [null, null, null, null, null, null, null, null, null] }
  },

  moves: {
    clickCell: function clickCell(move, cellIndex) {
      if (move.G.cells[cellIndex] !== null) {
        return INVALID_MOVE;
      }
      move.G.cells[cellIndex] = move.playerID;
    },
  },

  turn: {
    minMoves: 1,
    maxMoves: 1,
  },
};`
    }));
  </script>

  <script id="turn-board" type="module">
    display(gameBoard(turnCode, {
      showDebug: true,
      showState: true,
      hint: "Klick auf verschiedene Felder: Es wechselt automatisch zwischen Spieler ✕ (0) und ◯ (1). Im Debug Panel scheitert endTurn jetzt, solange du noch keinen Zug gemacht hast (minMoves)."
    }));
  </script>

  <script id="turn-note-md" type="text/markdown">
    > 💡 Es gibt noch viele weitere Möglichkeiten, Züge zu steuern (Zugreihenfolge,
    > Phasen, Ereignisse). Für Tic-Tac-Toe reichen uns `minMoves` und `maxMoves`.
  </script>

  <script id="uebung-md" type="text/markdown">
    ---

    ## Übung 🎯

    Bau die beiden Verbesserungen selbst ein. Starte vom Stand aus Kapitel 1 und
    ergänze:

    1. `clickCell` soll **`INVALID_MOVE` zurückgeben**, wenn das Feld schon belegt ist
       (also nicht `null`).
    2. Füge ein `turn`-Objekt mit **`minMoves: 1`** und **`maxMoves: 1`** hinzu.

    Die Auswertung prüft beides automatisch.
  </script>

  <script id="uebung-editor" type="module">
    const uebungCode = view(codeEditor("bgio:ch2_final", {
      value: `import { INVALID_MOVE } from 'boardgame.io/core';

export const TicTacToe = {
  setup: function setup() {
    return { cells: [null, null, null, null, null, null, null, null, null] }
  },

  moves: {
    clickCell: function clickCell(move, cellIndex) {
      // 1. gib INVALID_MOVE zurueck, wenn das Feld schon belegt ist

      move.G.cells[cellIndex] = move.playerID;
    },
  },

  // 2. fuege hier ein turn-Objekt mit minMoves und maxMoves hinzu
};`
    }));
  </script>

  <script id="uebung-board" type="module">
    display(gameBoard(uebungCode, { showDebug: true, showState: true }));
  </script>

  <script id="uebung-feedback" type="module">
    {
      let feedback;
      try {
        const game = loadGame(uebungCode);
        const engine = createEngine(game);

        // 1. invalid move check: occupy cell 0, then try to overwrite it
        engine.makeMove("clickCell", 0);
        const beforeOwner = engine.G.cells[0];
        const overwrite = engine.makeMove("clickCell", 0);
        const rejectsOccupied = overwrite.reason === "invalid" && engine.G.cells[0] === beforeOwner;

        // 2. turn handling: after one move the player should have switched.
        const fresh = createEngine(loadGame(uebungCode));
        const p0 = fresh.ctx.currentPlayer;
        fresh.makeMove("clickCell", 4);
        const switched = fresh.ctx.currentPlayer !== p0;

        if (!(game.moves && game.moves.clickCell))
          feedback = err(html`Es fehlt der <code>clickCell</code>-Move.`);
        else if (!rejectsOccupied)
          feedback = err(html`Ein Klick auf ein belegtes Feld sollte abgelehnt werden — gib <code>INVALID_MOVE</code> zurück, wenn <code>move.G.cells[cellIndex] !== null</code>.`);
        else if (!switched)
          feedback = err(html`Nach einem Zug sollte automatisch der nächste Spieler dran sein — füg <code>turn: { minMoves: 1, maxMoves: 1 }</code> hinzu.`);
        else
          feedback = ok(html`🎉 Stark! Ungültige Züge werden abgelehnt und der Spieler wechselt automatisch.`);
      } catch (e) {
        feedback = err(html`Dein Code lässt sich nicht ausführen: ${e.message}`);
      }
      display(feedback);
    }
  </script>

  <script id="outro" type="text/markdown">
    ---

    ## Geschafft! 🚀

    Du hast in diesem Kapitel gelernt:

    - **`INVALID_MOVE`** — ein Move gibt diese Konstante zurück, um sich selbst für
      ungültig zu erklären; `G` bleibt dann unverändert.
    - **`turn: { minMoves, maxMoves }`** — steuert, wie viele Moves ein Spieler pro Zug
      machen muss bzw. darf, und beendet den Zug automatisch.

    Unser Spiel hat aber noch ein Problem: Es **endet nie**. Selbst wenn jemand drei in
    einer Reihe hat, läuft es weiter. Das beheben wir als Nächstes.

  </script>
